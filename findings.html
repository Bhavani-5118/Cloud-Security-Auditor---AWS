<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Security Findings</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/dashboard.css">

</head>

<body>

<div class="d-flex">

    <!-- Sidebar -->

    <div class="sidebar">

        <h3 class="text-center mt-3">☁ AWS Auditor</h3>

        <a href="dashboard.html">🏠 Dashboard</a>

        <a href="findings.html">⚠ Findings</a>

        <a href="reports.html">📄 Reports</a>

        <a href="settings.html">⚙ Settings</a>

        <a href="index.html">🚪 Logout</a>

    </div>

    <!-- Main -->

    <div class="main">

        <h2>Security Findings</h2>

        <hr>

        <div class="card p-4">

            <table class="table table-striped table-hover">

                <thead class="table-dark">

                <tr>

                    <th>Service</th>

                    <th>Issue</th>

                    <th>Severity</th>

                    <th>Status</th>

                </tr>

                </thead>

                <tbody>

                <tr>

                    <td>S3</td>

                    <td>Public Bucket</td>

                    <td><span class="badge bg-danger">Critical</span></td>

                    <td><span class="badge bg-warning text-dark">Open</span></td>

                </tr>

                <tr>

                    <td>EC2</td>

                    <td>Port 22 Open</td>

                    <td><span class="badge bg-warning text-dark">High</span></td>

                    <td><span class="badge bg-warning text-dark">Open</span></td>

                </tr>

                <tr>

                    <td>IAM</td>

                    <td>MFA Disabled</td>

                    <td><span class="badge bg-info">Medium</span></td>

                    <td><span class="badge bg-success">Resolved</span></td>

                </tr>

                <tr>

                    <td>CloudTrail</td>

                    <td>Logging Disabled</td>

                    <td><span class="badge bg-danger">Critical</span></td>

                    <td><span class="badge bg-warning text-dark">Open</span></td>

                </tr>

                <tr>

                    <td>Security Group</td>

                    <td>SSH Open to Internet</td>

                    <td><span class="badge bg-warning text-dark">High</span></td>

                    <td><span class="badge bg-warning text-dark">Open</span></td>

                </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

</body>
</html>
